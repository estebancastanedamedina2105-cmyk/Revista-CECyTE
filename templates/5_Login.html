<!doctype html>
<html>
  <head>
    <title>Ingreso CECytE</title>
    <link rel="stylesheet" href="../all css/5-Diseño-login.css" />
    <link rel="icon" href="../Imagenes/LogoCecyte.jpg" type="image/png" />
  </head>
  <div>
    <span class="bg-animate"></span>
    <span class="bg2-animate"></span>
  </div>
  <body>
    <div class="login-container">
      <div class="login-box">
        <img
          src="../Imagenes/LogoCecyte.jpg"
          alt="Logo CECyTE"
          class="login-logo"
        />
        <h2>Iniciar Sesion</h2>
        <form class="login-from">
          <div class="input-group">
            <input type="email" id="email" class="cajaCorreo" placeholder="123456@cecytemorelos.edu.mx"/>
          </div>
          <div>
          <button type="submit" class="login-button codigo generarCodigo">Mandar Codigo</button>
          </div>
          <div class="input-group">
            <input type="password" id="code" class="cajaCodigo" placeholder="Ingresa el codigo"/>
            <button type="submit" class="entrarCode login-button">Verificar</button>
            <p id="mensaje"></p>
          </div>
          <a
            href="javascript:history.back()"
            class="btn-login btn-salir"
            ><button type="button">Regresar</button></a
          >
        </form>
      </div>
    </div>
    <script src="../Clase Js/login.js"></script>
  </body>
</html>
