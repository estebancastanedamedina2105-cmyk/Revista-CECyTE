<!doctype html>
<html lang="es">
  <head>
    <title>Calendario CECyTE</title>
    <link rel="stylesheet" href="../static/Clase_CSS/3_Diseño-Calendario.css" />
    <link rel="stylesheet" href="../static/Clase_CSS/1_Diseño_Anuncios.css" />
    <link rel="stylesheet" href="../static/Clase_CSS/0_Diseño_Menu.css" />
    <link rel="icon" href="../static/Imagenes/LogoCecyte.jpg" type="image/png">
    <link rel="stylesheet" href="../static/Clase_CSS/Diseño_Chatbot.css" />
  </head>
  <body class="fondo_crema">
    <header class="header-superior">
      <div class="seccion-menuiz">
            <div class="seccion-izquierda-controles">
            <button id="modoOscuro" class="btn_oscuro botones"> 🌙 | ☀️</button>
            <button popovertarget="miMenu" for="check-menu" class="btn-menu"><h3>☰ Menu</h3></button>
        </div>
        <script>
            <!-- Modo oscuro -->
            const boton = document.getElementById("modoOscuro");
            boton.addEventListener("click", () => {
                document.body.classList.toggle("dark");
                if(document.body.classList.contains("dark")) {
                    localStorage.setItem("modo", "oscuro");
                } else {
                    localStorage.setItem("modo", "claro");
                }
            });
            if(localStorage.getItem("modo") === "oscuro") {
                document.body.classList.add("dark");
            }
        </script>
        </div>
        <h2 class="texmenu">CECyTE</h2>
        <div class="seccion-derecha">
        <button href="5-Login.html" class="botones-auth botones" type="button">Ingresar</button>
        <img src="../static/Imagenes/LogoCecyte.jpg" class="logo-circulo" title="Logo CCEyTE"/>
        </div>
    </header>
    <div class="diseño_principal">
      <input type="checkbox" id="check-menu" style="display: none;">
      <div class="barra-lateral" id="miMenu" popover>
        <div class="grupo-menu">
                <h2>Revista</h2>
                <ul>
                    <li><a href="{{ url_for('anuncios') }}" class="btn_item">☆ Anuncios</a></li>
                    <li><a href="{{ url_for('calendario') }}" class="btn_item">☆ Calendario</a></li>
                    <li><a href="{{ url_for('profesores') }}" class="btn_item">☆ Profesores</a></li>
                    <li><a href="{{ url_for('eventos') }}" class="btn_item">☆ Eventos</a></li>
                    <li><a href="{{ url_for('alumnos_destacados') }}" class="btn_item">☆ Alumnos destacados</a></li>
                </ul>
            </div>
            <div class="grupo-menu">
                <ul><hr>    
                    <li><a href="{{ url_for('cafeteria') }}" class="btn_item">☆ Menu de cafeteria</a></li>
                    <li><a href="{{ url_for('chismografo') }}" class="btn_item">☆ Chismografo</a></li>
                </hr></ul>
            </div>
            <div class="menu-usuario">
                <div>
                    <a href="{{ url_for('perfil') }}" class="btn_item">👤 User</a>
                </div>
                <div class="btn_item">Exit</div>
            </div>
      </div>

    <p style="text-align: center;" class ="titulo_seccion">Calendario</p>
    <div class="caja-inscripciones">
      <a class="subtitulos-seccion">Fechas de CECyTE Emiliano Zapata</a>
      <div class="tarjeta">
        <div class="encabezado-tarjeta">
        <div class="caja-mes">
          <label for="mes" class="txt"  >Selecciona un mes:</label>
          <input type="month" id="mes" onchange="procesarMes()">
          <p><strong class="txt" >Mes seleccionado:</strong> <span class="txt" id="nombreMesText">-</span></p>
          <p><strong class="txt">Días totales:</strong> <span class="txt" id="totalDias">-</span></p>
        </div>
          <div class="caja-informacion">
            <div id="contenedor-tabla">
            </div>
          </div>
        </div>
      </div>
    </div>
<script src="../static/Clase_JS/fecha.js"></script>
      </div>
    </div>
  </body>
</html>
