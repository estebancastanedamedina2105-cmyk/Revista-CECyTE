            <label for="check-menu" class="btn-menu"><h3> ☰ Menu</h3></label>
        </div>
        <script>
            // Script de Modo Oscuro corregido
            const boton = document.getElementById("modoOscuro");
            boton.addEventListener("click", () => {
                document.body.classList.toggle("dark");
                localStorage.setItem("modo", document.body.classList.contains("dark") ? "oscuro" : "claro");
            });
            if(localStorage.getItem("modo") === "oscuro") {
                document.body.classList.add("dark");
            }
        </script>
